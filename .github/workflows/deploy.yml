name: Deploy Flask Docker to 1Panel

on:
  push:
    branches:
      - main  # 触发分支，如果是 master 请改成 master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 获取最新代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 将代码同步到 1Panel 服务器
      - name: Sync Code to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "." # 同步当前仓库的所有文件
          # 【重要】排除不需要上传的文件，避免覆盖服务器上的敏感配置
          rm: false
          # 【注意】将下方的 target 替换为你 1Panel 服务器上存放该项目的实际绝对路径
          target: "/cloud-clipboard"

      # 3. SSH 登录服务器并重新构建 Docker 镜像
      - name: Rebuild and Restart Docker
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # 【注意】将 cd 后面的路径替换为你的实际路径
          script: |
            cd /cloud-clipboard
            # 停止旧容器
            docker-compose down
            # 重新构建并后台启动新容器
            docker-compose up -d --build
            # 清理悬空(dangling)的旧镜像，释放服务器磁盘空间
            docker image prune -f